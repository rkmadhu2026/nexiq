server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Any `add_header` in a child location disables inheritance from here — keep asset locations free of add_header
    # so these apply to hashed files and the SPA fallback, except the dedicated index block below.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Vite hashed files — `expires` sets Cache-Control; does not break header inheritance
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # Root-level static names (favicon, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webmanifest)$ {
        expires 7d;
        try_files $uri =404;
    }

    # App shell: internal redirect from try_files; must not be cached. Child `add_header` drops server-level headers, so repeat security lines.
    location = /index.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
