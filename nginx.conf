# Vite/React SPA: single `try_files` fallback to index.html. Avoids duplicate / exact-match
# blocks that can break internal redirects. Hashed assets live under /assets/.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Vite build output: long-lived hashed bundles
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Everything else: real files, then SPA shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
