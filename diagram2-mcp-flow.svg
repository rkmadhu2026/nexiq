<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d18;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1525;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e" opacity="0.8"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8" opacity="0.8"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b" opacity="0.9"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1200" height="48" fill="url(#hdr2)"/>
  <text x="24" y="30" fill="white" font-size="18" font-weight="700">LangGraph Query Flow — Real Data, Zero Hallucination</text>
  <text x="1176" y="30" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="end">MCP Protocol · SSE Transport</text>

  <!-- ─── QUERY INPUT ─── -->
  <rect x="30" y="80" width="200" height="80" rx="10" fill="#0c1f3a" stroke="#0891b2" stroke-width="2"/>
  <text x="130" y="108" fill="#0891b2" font-size="22" text-anchor="middle">💬</text>
  <text x="130" y="132" fill="white" font-size="13" font-weight="700" text-anchor="middle">User Query</text>
  <text x="130" y="150" fill="#64748b" font-size="10" text-anchor="middle">"Why is pod crashing?"</text>

  <!-- STEP 1 Intent -->
  <line x1="230" y1="120" x2="280" y2="120" stroke="#0891b2" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="280" y="80" width="180" height="80" rx="10" fill="#0a2010" stroke="#22c55e" stroke-width="2"/>
  <text x="370" y="105" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">NODE ①</text>
  <text x="370" y="122" fill="white" font-size="12" font-weight="700" text-anchor="middle">Intent Classifier</text>
  <text x="370" y="140" fill="#64748b" font-size="10" text-anchor="middle">LLM → POD_CRASH</text>
  <text x="370" y="154" fill="#64748b" font-size="10" text-anchor="middle">Extracts: pod name</text>

  <!-- STEP 2 Tool Selector -->
  <line x1="460" y1="120" x2="510" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="510" y="80" width="180" height="80" rx="10" fill="#0a2010" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="105" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">NODE ②</text>
  <text x="600" y="122" fill="white" font-size="12" font-weight="700" text-anchor="middle">Tool Selector</text>
  <text x="600" y="140" fill="#64748b" font-size="10" text-anchor="middle">→ loki-mcp</text>
  <text x="600" y="154" fill="#64748b" font-size="10" text-anchor="middle">→ prometheus-mcp</text>

  <!-- STEP 3 Data Fetcher -->
  <line x1="690" y1="120" x2="740" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="740" y="80" width="180" height="80" rx="10" fill="#0a2010" stroke="#22c55e" stroke-width="2"/>
  <text x="830" y="105" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">NODE ③</text>
  <text x="830" y="122" fill="white" font-size="12" font-weight="700" text-anchor="middle">Data Fetcher</text>
  <text x="830" y="140" fill="#64748b" font-size="10" text-anchor="middle">Calls MCP tools</text>
  <text x="830" y="154" fill="#64748b" font-size="10" text-anchor="middle">REAL data returned</text>

  <!-- STEP 4+ -->
  <line x1="920" y1="120" x2="970" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arr2)"/>
  <rect x="970" y="80" width="200" height="80" rx="10" fill="#0a2010" stroke="#22c55e" stroke-width="2"/>
  <text x="1070" y="105" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">NODES ④ ⑤ ⑥</text>
  <text x="1070" y="122" fill="white" font-size="12" font-weight="700" text-anchor="middle">Chart + Synth + Format</text>
  <text x="1070" y="140" fill="#64748b" font-size="10" text-anchor="middle">LLM reads real data</text>
  <text x="1070" y="154" fill="#64748b" font-size="10" text-anchor="middle">Grafana chart + logs</text>

  <!-- ─── MCP SERVERS (middle row) ─── -->
  <text x="30" y="210" fill="#334155" font-size="10" font-weight="600" letter-spacing="2">MCP TOOL CALLS (parallel execution)</text>

  <!-- Arrows from fetcher down to MCP servers -->
  <line x1="760" y1="160" x2="180" y2="245" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)" opacity="0.7"/>
  <line x1="790" y1="160" x2="380" y2="245" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr4)" opacity="0.7"/>
  <line x1="830" y1="160" x2="580" y2="245" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)" opacity="0.7"/>
  <line x1="870" y1="160" x2="780" y2="245" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)" opacity="0.7"/>
  <line x1="900" y1="160" x2="980" y2="245" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)" opacity="0.7"/>

  <!-- MCP Server cards -->
  <rect x="30" y="220" width="175" height="100" rx="8" fill="#0c1832" stroke="#0891b2" stroke-width="1.5"/>
  <text x="117" y="244" fill="#0891b2" font-size="11" font-weight="700" text-anchor="middle">prometheus-mcp</text>
  <text x="117" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8001/sse</text>
  <text x="117" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">get_cpu_usage(server, dur)</text>
  <text x="117" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_pod_restarts(ns)</text>
  <text x="117" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">get_queue_metrics(exch)</text>

  <rect x="215" y="220" width="175" height="100" rx="8" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="302" y="244" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle">elasticsearch-mcp</text>
  <text x="302" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8002/sse</text>
  <text x="302" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">get_order_by_id(id)</text>
  <text x="302" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_order_failures(dur)</text>
  <text x="302" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">get_trade_analytics()</text>

  <rect x="400" y="220" width="175" height="100" rx="8" fill="#160a2e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="487" y="244" fill="#a855f7" font-size="11" font-weight="700" text-anchor="middle">loki-mcp</text>
  <text x="487" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8003/sse</text>
  <text x="487" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">get_pod_logs(pod, lvl)</text>
  <text x="487" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_app_errors(svc)</text>
  <text x="487" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">get_crash_logs(pod)</text>

  <rect x="585" y="220" width="175" height="100" rx="8" fill="#0a2010" stroke="#22c55e" stroke-width="1.5"/>
  <text x="672" y="244" fill="#22c55e" font-size="11" font-weight="700" text-anchor="middle">kubernetes-mcp</text>
  <text x="672" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8004/sse</text>
  <text x="672" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">get_pod_status(ns)</text>
  <text x="672" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_k8s_events(pod)</text>
  <text x="672" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">get_node_health()</text>

  <rect x="770" y="220" width="175" height="100" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="857" y="244" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle">snmp-network-mcp ★</text>
  <text x="857" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8005/sse</text>
  <text x="857" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">get_switch_ports(ip)</text>
  <text x="857" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_firewall_status()</text>
  <text x="857" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">get_device_health(ip)</text>

  <rect x="955" y="220" width="175" height="100" rx="8" fill="#050a20" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="1042" y="244" fill="#06b6d4" font-size="11" font-weight="700" text-anchor="middle">runbook-mcp</text>
  <text x="1042" y="260" fill="#475569" font-size="9" text-anchor="middle">localhost:8006/sse</text>
  <text x="1042" y="280" fill="#94a3b8" font-size="9" text-anchor="middle">search_runbook(query)</text>
  <text x="1042" y="294" fill="#94a3b8" font-size="9" text-anchor="middle">get_sop_by_issue(type)</text>
  <text x="1042" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">RAG + pgVector</text>

  <!-- DATA SOURCES (bottom) -->
  <text x="30" y="365" fill="#334155" font-size="10" font-weight="600" letter-spacing="2">REAL DATA SOURCES</text>

  <line x1="117" y1="320" x2="117" y2="378" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="302" y1="320" x2="302" y2="378" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr4)"/>
  <line x1="487" y1="320" x2="487" y2="378" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="672" y1="320" x2="672" y2="378" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="857" y1="320" x2="857" y2="378" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="1042" y1="320" x2="1042" y2="378" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="30" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="117" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">Prometheus :9090</text>
  <text x="117" y="416" fill="#475569" font-size="9" text-anchor="middle">PromQL HTTP API</text>

  <rect x="215" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="302" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">Elasticsearch :9200</text>
  <text x="302" y="416" fill="#475569" font-size="9" text-anchor="middle">REST Query DSL</text>

  <rect x="400" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="487" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">Grafana Loki :3100</text>
  <text x="487" y="416" fill="#475569" font-size="9" text-anchor="middle">LogQL HTTP API</text>

  <rect x="585" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="672" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">Kubernetes :6443</text>
  <text x="672" y="416" fill="#475569" font-size="9" text-anchor="middle">K8s REST API</text>

  <rect x="770" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="857" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">SNMP Devices :161</text>
  <text x="857" y="416" fill="#475569" font-size="9" text-anchor="middle">Cisco / Aruba / Huawei</text>

  <rect x="955" y="378" width="175" height="50" rx="6" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="1042" y="400" fill="#94a3b8" font-size="11" text-anchor="middle">PostgreSQL :5432</text>
  <text x="1042" y="416" fill="#475569" font-size="9" text-anchor="middle">pgVector + LinkedEye DB</text>

  <!-- RESPONSE SECTION -->
  <rect x="30" y="470" width="1140" height="180" rx="10" fill="#080f1a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="496" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle">RESPONSE OUTPUT — GRAFANA STYLE + DATADOG LOGS</text>

  <!-- Response cards -->
  <rect x="50" y="506" width="240" height="120" rx="8" fill="#0c1f3a" stroke="#0891b2" stroke-width="1"/>
  <text x="170" y="528" fill="#0891b2" font-size="10" font-weight="700" text-anchor="middle">📈 GRAFANA CHART (inline)</text>
  <text x="170" y="548" fill="#94a3b8" font-size="9" text-anchor="middle">Recharts LineChart / AreaChart</text>
  <text x="170" y="564" fill="#94a3b8" font-size="9" text-anchor="middle">Real Prometheus time-series</text>
  <text x="170" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">Threshold reference lines</text>
  <text x="170" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">P50 / P95 / P99 overlays</text>
  <text x="170" y="612" fill="#64748b" font-size="9" text-anchor="middle">Dark theme · Live data</text>

  <rect x="310" y="506" width="240" height="120" rx="8" fill="#0a1422" stroke="#f59e0b" stroke-width="1"/>
  <text x="430" y="528" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle">📋 DATADOG LOG VIEW (inline)</text>
  <text x="430" y="548" fill="#94a3b8" font-size="9" text-anchor="middle">FATAL / ERROR / WARN / INFO</text>
  <text x="430" y="564" fill="#94a3b8" font-size="9" text-anchor="middle">Timestamp · Service · Message</text>
  <text x="430" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">Filter by level + text search</text>
  <text x="430" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">Real Loki + ES log lines</text>
  <text x="430" y="612" fill="#64748b" font-size="9" text-anchor="middle">Color-coded severity</text>

  <rect x="570" y="506" width="240" height="120" rx="8" fill="#0a1f0a" stroke="#22c55e" stroke-width="1"/>
  <text x="690" y="528" fill="#22c55e" font-size="10" font-weight="700" text-anchor="middle">🤖 AI ROOT CAUSE ANALYSIS</text>
  <text x="690" y="548" fill="#94a3b8" font-size="9" text-anchor="middle">Plain English explanation</text>
  <text x="690" y="564" fill="#94a3b8" font-size="9" text-anchor="middle">LLM reads real fetched data</text>
  <text x="690" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">Cites specific log lines</text>
  <text x="690" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">Never guesses — data only</text>
  <text x="690" y="612" fill="#64748b" font-size="9" text-anchor="middle">Severity: CRITICAL/WARN/OK</text>

  <rect x="830" y="506" width="240" height="120" rx="8" fill="#200a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="950" y="528" fill="#ef4444" font-size="10" font-weight="700" text-anchor="middle">⚡ RECOMMENDED ACTION</text>
  <text x="950" y="548" fill="#94a3b8" font-size="9" text-anchor="middle">Exact kubectl commands</text>
  <text x="950" y="564" fill="#94a3b8" font-size="9" text-anchor="middle">Runbook section reference</text>
  <text x="950" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">Config change instructions</text>
  <text x="950" y="596" fill="#94a3b8" font-size="9" text-anchor="middle">Source citations listed</text>
  <text x="950" y="612" fill="#64748b" font-size="9" text-anchor="middle">Web + Slack channels</text>

  <!-- Bottom tag -->
  <text x="600" y="680" fill="#1e3a5f" font-size="10" text-anchor="middle">Every answer is grounded in real data from your own infrastructure. LLM is a reader, not a knower.</text>
</svg>
